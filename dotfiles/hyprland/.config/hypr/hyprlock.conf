
# HYPRLOCK CONFIG

background {
  monitor =
  path = ~/.config/hypr/wallpaper/mega_vulcan.jpg
  blur_passes = 1
  blur_size = 7
  brightness = 0.5
  color = rgba(0, 0, 0, 0.4)
}

input-field {
  monitor =
  size = 25%, 7% 
  font_family = Noto Sans
  dots_size = 0.08
  outer_color = rgba(90,5,0,1)
  inner_color = rgba(0,0,0,0.5)
  font_color = rgba(255,255,255,0.9)
  dots_size = 0.3
  dots_center = 1 
  fade_on_empty = true
  capslock_color = rgba(255,200,80,1)
}

label {
  monitor =
  text = $TIME
   
  font_size = 120
  position = 0, 330
}

animations { enabled = 1 }

bezier = myBezier, 3, 3, 3, 3 

# Появление и исчезание
animation = fadeIn, 1, 4, myBezier
animation = fadeOut, 1, 4, myBezier

bezier = customEase, 0.42, 0.0, 0.58, 1.0

animation = inputFieldDots, 1, 4, customEase
animation = inputFieldWidth, 1, 4, customEase # Плавное расширение поля ввода


general {
    fail_timeout = 1000
    screencopy_mode = 0 # gpu based
    hide_cursor = true
}



















