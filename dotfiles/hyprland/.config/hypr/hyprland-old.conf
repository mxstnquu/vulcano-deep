#hyprland.conf

#========================== MONITORS ==========================#

#laptop monitor
monitor = eDP-1, disable

monitorv2 {
   output = eDP-1
   mode = 1920x1080@144
   position = 0x0
   scale = 1.20
}


monitorv2 {
    output = DP-1
    mode = 2560x1440@164.96Hz  
    position = auto
    scale = 1
    transform = 0
    vrr = 0
}

monitorv2 {
    output = HDMI-A-1
    #mode = 1920x1080@60.00Hz
    #mode = 3840x2160@60.00Hz
    mode = 2560x1440@144Hz
    #mode = 2560x1440@59.95Hz
    #mode = 1920x1080@60.00Hz
    position = auto
    scale = 1
    transform = 0
}

#======================== MY PROGRAMS ========================#

$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun


#========================= AUTOSTART =========================#

exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = hyprsunset -t 5000

exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets


#for dark theme
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"   # for GTK3 apps
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt 

#=================== ENVIRONMENT VARIABLES ===================#

env = GDK_BACKEND=wayland,x11
env = QT_QPA_PLATFORM="wayland;xcb"
env = SDL_VIDEODRIVER=wayland
env = CLUTTER_BACKEND=wayland
env = XDG_CURRENT_DESKTOP=Hyprland
env = XDG_SESSION_TYPE=wayland
env = XDG_SESSION_DESKTOP=Hyprland

env = QT_WAYLAND_DISABLE_WINDOWDECORATION=1
env = QT_QPA_PLATFORMTHEME=qt5ct

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# electron apps
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Firefox
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DISABLE_RDD_SANDBOX,1
env = EGL_PLATFORM,wayland


#======================== PERMISSIONS ========================#

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#======================= LOOK AND FEEL =======================#

general {
    gaps_in = 2
    gaps_out = 5

    border_size = 2

    col.active_border = rgba(90,5,0,1) 
    col.inactive_border = rgba(0,0,0,1)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 8
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    bezier = balance, 0.2, 1, 0.3, 1

    animation = windows, 1, 4.5, balance, slidefade 20%
    animation = windowsIn, 1, 4.2, balance, slidefade 20%
    animation = windowsOut, 1, 3.5, balance, slidefade 50%
    
    animation = fade, 1, 4, default
    
    animation = workspaces, 1, 4, balance, slide
}


dwindle {
    # pseudotile = true 
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}



#=========================== INPUT ===========================#

input {
    kb_layout = us, ru
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle # super + spase
    kb_rules =
    repeat_rate = 35

    follow_mouse = 1
    sensitivity = -0.93

    touchpad {
        disable_while_typing = false
        natural_scroll = true
    }

    device {
    }
}

device {
    name = elan1203:00-04f3:307a-touchpad
    sensitivity = -0.05
    scroll_factor = 0.5
}


#======================== KEYBINDINGS ========================#

$mainMod = SUPER 

bind = $mainMod, C, killactive,
bind = $mainMod, L, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod SHIFT, P, exec, kanshictl switch standard
bind = $mainMod SHIFT CTRL, P, exec, kanshictl switch external
bind = $mainMod SHIFT CTRL, L, exec, kanshictl switch internal
bind = $mainMod, I, layoutmsg, togglesplit
bind = $mainMod, J, layoutmsg, swapsplit
bind = $mainMod, O, fullscreen, 0
bind = $mainMod SHIFT, O, fullscreen, 1

# Binds for program: firefox, dolphin, firefox-developer-edition,
# rofi, kitty, btop, hyprlock, pavucontrol, gwenview
# code (aur), qtcreator, throne (github), Telegram (github)
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, exec, firefox
bind = $mainMod SHIFT, F, exec, firefox-developer-edition
bind = $mainMod, R, exec, $menu
bind = $mainMod, T, exec, $terminal
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, B, exec, $terminal btop
bind = $mainMod, M, exec, hyprlock

bind = $mainMod, W, exec, pavucontrol
bind = $mainMod, Q, exec, code
bind = $mainMod SHIFT, Q, exec, qtcreator
bind = $mainMod, U, exec, throne
bind = $mainMod, G, exec, gwenview
bind = $mainMod, Y, exec, /home/mxst/Downloads/Telegram/Telegram

# Hyprshot
bind = , Print, exec, hyprshot -m region -z -s -o ~/hyprshot
bind = $mainMod, Print, exec, hyprshot -m output -z -s -o ~/hyprshot 

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize window
binde = $mainMod SHIFT, K, resizeactive, 30 0
binde = $mainMod SHIFT, J, resizeactive, -30 0
binde = $mainMod SHIFT, H, resizeactive, 0 -20
binde = $mainMod SHIFT, L, resizeactive, 0 20

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 1%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-

bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 1%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 1%-



#=================== WINDOWS AND WORKSPACES ===================#

# Ignore maximize requests from apps.
windowrule = match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland
windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_focus on


windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}

xwayland {
    force_zero_scaling = true
}

hl.layer_rule({ match = { namespace = "rofi" }, 
blur = true })
